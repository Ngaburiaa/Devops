name: Deploy Lambda Email Service To Production Environment

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/email-service/**'
      - '.github/workflows/prod-lambda.yml'
  workflow_dispatch:

jobs:
  deploy-lambda:
    name: Deploy Lambda Function
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
          aws-region: ${{ secrets.AWS_REGION_PRODUCTION }}

      - name: Build Lambda deployment package
        run: |
          cd lambda/email-service
          mkdir -p dist
          cd src
          zip -r ../dist/deployment.zip index.mjs
          cd ..
          echo "Deployment package created"
          ls -lh dist/deployment.zip

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_EMAIL_SERVICE_FUNCTION_NAME }} \
            --zip-file fileb://lambda/email-service/dist/deployment.zip \
            --region ${{ secrets.AWS_REGION_PRODUCTION }}

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name "${{ vars.LAMBDA_EMAIL_SERVICE_FUNCTION_NAME }}" \
            --environment "Variables={TENANT_ID=${{ secrets.AZURE_TENANT_ID_PRODUCTION }},CLIENT_ID=${{ secrets.AZURE_CLIENT_ID_PRODUCTION }},CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET_PRODUCTION }},SENDER_USER_ID=${{ secrets.SENDER_EMAIL_PRODUCTION }}}" \
            --region "${{ secrets.AWS_REGION_PRODUCTION }}"


      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_EMAIL_SERVICE_FUNCTION_NAME }} \
            --region ${{ secrets.AWS_REGION_PRODUCTION }}

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name ${{ vars.LAMBDA_EMAIL_SERVICE_FUNCTION_NAME }} \
            --region ${{ secrets.AWS_REGION_PRODUCTION }} \
            --query 'Configuration.[FunctionName,Runtime,LastModified,State]' \
            --output table

      - name: Deployment summary
        run: |
          echo "Lambda function deployed successfully"
          echo "Function: ${{ vars.LAMBDA_EMAIL_SERVICE_FUNCTION_NAME }}"
          echo "Region: ${{ secrets.AWS_REGION_PRODUCTION }}"
          echo "Timestamp: $(date)"