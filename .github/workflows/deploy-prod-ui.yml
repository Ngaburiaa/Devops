name: Deploy UI to PRODUCTION (S3 + CloudFront)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
 
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ${{ vars.PR_RUNNER }}
    environment: production

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache node modules
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('ui/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.NODE_VERSION }}

    - name: Install dependencies
      run: npm install
      working-directory: ui

    - name: Build UI
      run: npm run build
      working-directory: ui
      env:
        VITE_BASE_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}
        VITE_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
        aws-region: ${{ secrets.AWS_REGION_PRODUCTION }}

    - name: Sync to S3
      run: |
        aws s3 sync ui/dist s3://itrack-assets-production --delete
        echo "✅ UI files synced to S3 bucket: itrack-assets-production"

    - name: Create CloudFront invalidation
      run: |
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths '/*' \
          --query 'Invalidation.Id' \
          --output text)
        echo "✅ CloudFront invalidation created: $INVALIDATION_ID"
        echo "⏳ Waiting for invalidation to complete..."
        aws cloudfront wait invalidation-completed \
          --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
          --id $INVALIDATION_ID
        echo "✅ CloudFront cache invalidated successfully"

    - name: Get CloudFront URL
      run: |
        CLOUDFRONT_URL=$(aws cloudfront get-distribution \
          --id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
          --query 'Distribution.DomainName' \
          --output text)
        echo "🚀 UI deployed successfully!"
        echo "📍 CloudFront URL: https://$CLOUDFRONT_URL"

  notify:
    name: Notify on Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: always()
    
    steps:
      - name: Notify on Success
        if: needs.build-and-deploy.result == 'success'
        run: |
          echo "🎉 UI deployment to PRODUCTION successful!"
          
      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ UI deployment failed!"
